name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Run linting 🔍
        run: pnpm lint:check

      - name: Run tests 🧪
        run: pnpm test:coverage

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build library 🛠
        run: pnpm build

      - name: Check build output 📁
        run: |
          ls -la dist/
          test -f dist/index.cjs
          test -f dist/index.mjs
          test -f dist/index.umd.js
          test -d dist/types

      - name: Type-check public API 🔎
        run: pnpm tsc --noEmit --project tsconfig.typetest.json
